<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>juicefest</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        background-image: url("timewarp02.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      .title {
        position: absolute;
        top: 20px;
        left: 20px;
        margin: 0;
        color: orange;
        text-transform: lowercase;
        font-size: 25vw;
        line-height: 0.8;
        transform: scaleY(2);
        transform: scaleX(5);
        transform-origin: top left;
      }

      @media (min-width: 768px) {
        .title {
          font-size: 12vw;
        }
      }
    </style>
  </head>
  <body>
    <h1 class="title">juicefest</h1>
  </body>
</html>
