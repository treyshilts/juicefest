<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>juicefest</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        background-image: url("timewarp02.jpg");
        background-size: cover;
        background-position: 0% 100%;
        background-repeat: no-repeat;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
      
      /* large desktop */
      @media (max-width: 1200px) {
        body {
          background-position: 15% 100%;
        }
      }
      
      /* small desktop / tablet */
      @media (max-width: 1000px) {
        body {
          background-position: 25% 100%;
        }
      }
      
      /* tablet */
      @media (max-width: 850px) {
        body {
          background-position: 35% 100%;
        }
      }
      
      /* mobile */
      @media (max-width: 767px) {
        body {
          background-position: 50% 100%;
        }
      }

      .title {
        position: absolute;
        top: 20px;
        left: 20px;
        margin: 0;
        color: #F28C28;
        text-transform: lowercase;
        font-size: 25vw;
        line-height: 0.8;
        font-weight: 900;
        letter-spacing: -0.1em;
        transform: scaleY(2.5) scaleX(0.7);
        transform-origin: center;
      }
      
      .menu {
        position: absolute;
        top: 35px;
        right: 35px;
        display: flex;
        gap: 75px;
        font-size: 2rem;
        line-height: 1;
        font-weight: 400;
        text-transform: lowercase;
      }
      
      .menu a {
        color: #F28C28;
        text-decoration: none;
        display: inline-block;
        transform: scaleY(2) scaleX(1.4);
        transform-origin: right;
      }
      
      .menu a.greenroom {
        color: #36B030;
      }
      
      @media (max-width: 767px) {
        .menu {
          top: auto;
          right: 35px;
          bottom: 35px;
          flex-direction: column;
          align-items: flex-end;
          gap: 18px;
          font-size: 2rem;
        }
      }
      @media (min-width: 768px) {
        .title {
          font-size: 12vw;
        }
      }
    </style>
  </head>
  <body>
    <h1 class="title">juicefest</h1>
    <nav class="menu">
    <a href="#">archive</a>
    <a href="#">blog</a>
    <a href="#">about</a>
    <a href="#" class="greenroom">greenroom</a>
</nav>
  </body>
</html>
