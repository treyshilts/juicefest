<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>blog</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        background-color: yellow;
        background-size: cover;
        background-position: center top;
        background-repeat: no-repeat;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      .title {
        position: absolute;
        top: 20px;
        left: 20px;
        margin: 0;
        color: #F28C28;
        text-transform: lowercase;
        font-size: 15vw;
        line-height: 0.8;
        font-weight: 900;
        letter-spacing: -0.1em;
        transform: scaleY(2.5) scaleX(0.7);
        transform-origin: top left;
      }

      .menu {
        position: absolute;
        top: 35px;
        right: 35px;
        display: flex;
        gap: 42px;
        gap: 50px;
        font-size: 2.5rem;
        line-height: 1;
        font-weight: 400;
        text-transform: lowercase;
      }

      .menu a {
        color: #F28C28;
        text-decoration: none;
        display: inline-block;
        transform: scaleY(1.7) scaleX(1);
        transform-origin: right;
      }

      .menu a.greenroom {
        color: #36B030;
      }

      @media (max-width: 1100px) {
        .menu {
          top: auto;
          right: 35px;
          bottom: 35px;
          flex-direction: column;
          align-items: flex-end;
          gap: 18px;
          font-size: 2.5rem;
        }
      }
      @media (min-width: 1101px) {
        .title {
          font-size: 12vw;
        }
      }
    </style>
  </head>
  <body>
    
</nav>
  </body>
</html>
